name: Security Pack — Quarterly Publish

on:
  workflow_dispatch:
  schedule:
    # First day of each quarter at 06:00 UTC (Jan 1, Apr 1, Jul 1, Oct 1)
    - cron: '0 6 1 1,4,7,10 *'

jobs:
  security-pack:
    name: Generate security pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout marketing website
        uses: actions/checkout@v4

      - name: Checkout Thursday platform repo
        uses: actions/checkout@v4
        with:
          repository: jeffreyhoyt/Thursday
          path: thursday-platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: thursday-platform/package-lock.json

      - name: Install platform dependencies
        working-directory: thursday-platform
        run: npm ci --workspace packages/compliance-engine --workspace packages/shared --ignore-scripts

      - name: Generate security pack
        working-directory: thursday-platform
        run: npm run security:pack

      - name: Copy rendered security pack to website
        run: |
          # In the future, parse and update the security page content here;
          # for now, the page is statically maintained.
          # The rendered file is available at:
          #   thursday-platform/docs/security/vendor-security-overview-RENDERED-*.md
          echo "Security pack generated. Review thursday-platform/docs/security/ for the latest rendered output."
          ls thursday-platform/docs/security/vendor-security-overview-RENDERED-*.md 2>/dev/null || echo "No rendered file found — check npm run security:pack output above."
