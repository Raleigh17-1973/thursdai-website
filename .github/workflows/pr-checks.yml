name: PR Checks

on:
  pull_request:
    branches: [main, staging]

jobs:
  checks:
    name: Type check, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint -- --max-warnings 0
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://thursdai.com

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://thursdai.com
      - run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
