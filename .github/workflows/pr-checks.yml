name: PR Checks

on:
  pull_request:
    branches: [main, staging]

jobs:
  checks:
    name: Type check, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
